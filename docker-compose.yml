# ============================================================
# Flash Exchange – docker-compose.yml
# Compatible with Coolify (v4+) and standard Docker Compose v2
#
# COOLIFY USAGE:
#   1. Push this repo to your Git provider.
#   2. In Coolify → "Add Resource" → "Docker Compose".
#   3. Set all environment variables in the Coolify UI
#      (they override the defaults below).
#   4. Coolify auto-handles SSL via its proxy.
#
# LOCAL USAGE:
#   cp .env.example .env     # fill in your values
#   docker compose up -d     # starts postgres + app
# ============================================================

version: '3.9'

services:

  # ── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${PGDATABASE:-flashexchange}
      POSTGRES_USER:     ${PGUSER:-flashuser}
      POSTGRES_PASSWORD: ${PGPASSWORD:-changeme_in_production}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      # Persist database data across container restarts
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-flashuser} -d ${PGDATABASE:-flashexchange}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s
    # Not exposed externally — only the app container connects to it
    networks:
      - internal

  # ── Flash Exchange Application ─────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      # Coolify's reverse proxy will forward traffic here.
      # Change the host port (3000) if you have a conflict.
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV:    production
      PORT:        3000

      # ── Database (point to the postgres service above) ──
      PGHOST:     postgres
      PGPORT:     5432
      PGDATABASE: ${PGDATABASE:-flashexchange}
      PGUSER:     ${PGUSER:-flashuser}
      PGPASSWORD: ${PGPASSWORD:-changeme_in_production}

      # ── Admin ───────────────────────────────────────────
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-CHANGE_THIS_NOW}

      # ── Token Configuration ─────────────────────────────
      TOKEN_NETWORK:           ${TOKEN_NETWORK:-bsc}
      TOKEN_CONTRACT_ADDRESS:  ${TOKEN_CONTRACT_ADDRESS}
      TOKEN_DECIMALS:          ${TOKEN_DECIMALS:-18}
      TOKEN_SYMBOL:            ${TOKEN_SYMBOL:-FLASH}
      TOKEN_PRICE_USD:         ${TOKEN_PRICE_USD:-0.02}

      # ── Distribution Wallet ─────────────────────────────
      DISTRIBUTION_WALLET_ADDRESS:     ${DISTRIBUTION_WALLET_ADDRESS}
      DISTRIBUTION_WALLET_PRIVATE_KEY: ${DISTRIBUTION_WALLET_PRIVATE_KEY}

      # ── Payment Receiver Wallets ────────────────────────
      BSC_PAYMENT_ADDRESS:  ${BSC_PAYMENT_ADDRESS}
      ETH_PAYMENT_ADDRESS:  ${ETH_PAYMENT_ADDRESS}
      TRON_PAYMENT_ADDRESS: ${TRON_PAYMENT_ADDRESS}

      # ── RPC Endpoints ───────────────────────────────────
      BSC_RPC_URL:          ${BSC_RPC_URL:-https://bsc-dataseed.binance.org/}
      BSC_RPC_URL_FALLBACK: ${BSC_RPC_URL_FALLBACK:-https://bsc-dataseed1.defibit.io/}
      ETH_RPC_URL:          ${ETH_RPC_URL:-https://cloudflare-eth.com}
      ETH_RPC_URL_FALLBACK: ${ETH_RPC_URL_FALLBACK:-https://rpc.ankr.com/eth}
      TRONGRID_API_KEY:     ${TRONGRID_API_KEY:-}

      # ── Contract Addresses ──────────────────────────────
      USDT_BEP20_CONTRACT: ${USDT_BEP20_CONTRACT:-0x55d398326f99059ff775485246999027b3197955}
      USDT_ERC20_CONTRACT: ${USDT_ERC20_CONTRACT:-0xdAC17F958D2ee523a2206206994597C13D831ec7}
      USDT_TRC20_CONTRACT: ${USDT_TRC20_CONTRACT:-TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t}

      # ── Thresholds ──────────────────────────────────────
      LOW_GAS_THRESHOLD_BNB: ${LOW_GAS_THRESHOLD_BNB:-0.05}
      LOW_GAS_THRESHOLD_ETH: ${LOW_GAS_THRESHOLD_ETH:-0.01}
      LOW_TOKEN_THRESHOLD:   ${LOW_TOKEN_THRESHOLD:-10000}

      # ── Order Config ────────────────────────────────────
      ORDER_EXPIRY_MINUTES:      ${ORDER_EXPIRY_MINUTES:-30}
      TOKEN_SEND_MAX_RETRIES:    ${TOKEN_SEND_MAX_RETRIES:-3}
      TOKEN_SEND_RETRY_DELAY_MS: ${TOKEN_SEND_RETRY_DELAY_MS:-60000}

      # ── CoinGecko ───────────────────────────────────────
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}

    depends_on:
      postgres:
        condition: service_healthy  # Wait for DB to be ready before starting app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 45s
    networks:
      - internal
      - external
    # Required for blockchain RPC calls
    dns:
      - 8.8.8.8
      - 1.1.1.1

# ── Networks ───────────────────────────────────────────────────
networks:
  internal:
    # Internal network — postgres is not accessible from outside
    driver: bridge
    internal: false  # set to true if you want fully isolated network
  external:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
    # Coolify handles volume persistence automatically
    # For manual Docker deployments, data is in /var/lib/docker/volumes/
